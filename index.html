<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Store GT</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: black;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 10px;
    cursor: pointer;
}

/* BOTÓN CARRITO */
.carrito-btn {
    position: relative;
    font-size: 24px;
    cursor: pointer;
}

#contador {
    position: absolute;
    top: -5px;
    right: -10px;
    background: red;
    color: white;
    border-radius: 50%;
    padding: 2px 6px;
    font-size: 12px;
}

/* HERO */
.hero {
    background: #111;
    color: white;
    text-align: center;
    padding: 40px;
}

/* PRODUCTOS */
.container {
    padding: 20px;
}

.productos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.producto {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.producto img {
    width: 100%;
}

/* INPUT CANTIDAD */
.cantidad {
    width: 60px;
    margin-top: 5px;
}

/* CARRITO */
#carrito {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: white;
    padding: 15px;
    box-shadow: -2px 0 10px rgba(0,0,0,0.3);
}

/* BOTÓN SUBIR */
#subir {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
}

/* FOOTER */
footer {
    background: black;
    color: white;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h2>Nova Store GT</h2>

    <nav>
        <a onclick="filtrar('todos')">Inicio</a>
        <a onclick="filtrar('accesorios')">Accesorios</a>
        <a onclick="filtrar('tecnologia')">Tecnología</a>
    </nav>

    <div class="carrito-btn" onclick="toggleCarrito()">
        🛒
        <span id="contador">0</span>
    </div>
</header>

<div class="hero">
    <h1>Tu tienda de confianza 🔥</h1>
</div>

<div class="container">
    <div class="productos">

        <div class="producto" data-categoria="accesorios">
            <img src="https://via.placeholder.com/200">
            <h3>Reloj</h3>
            <p>Q120</p>
            <input type="number" value="1" min="1" class="cantidad" id="c1">
            <button onclick="agregar('Reloj',120,'c1')">Agregar</button>
        </div>

        <div class="producto" data-categoria="accesorios">
            <img src="https://via.placeholder.com/200">
            <h3>Cadena</h3>
            <p>Q60</p>
            <input type="number" value="1" min="1" class="cantidad" id="c2">
            <button onclick="agregar('Cadena',60,'c2')">Agregar</button>
        </div>

        <div class="producto" data-categoria="tecnologia">
            <img src="https://via.placeholder.com/200">
            <h3>Audífonos</h3>
            <p>Q150</p>
            <input type="number" value="1" min="1" class="cantidad" id="c3">
            <button onclick="agregar('Audífonos',150,'c3')">Agregar</button>
        </div>

    </div>
</div>

<!-- CARRITO -->
<div id="carrito">
    <button onclick="toggleCarrito()">❌</button>
    <h3>Carrito</h3>
    <ul id="lista"></ul>
    <p>Total: Q<span id="total">0</span></p>
    <button onclick="comprar()">Comprar</button>
</div>

<!-- BOTÓN SUBIR -->
<button id="subir" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<!-- FOOTER -->
<footer>
    <p>📱 WhatsApp: 50212345678</p>
    <p>📧 Correo: tunegocio@gmail.com</p>
    <p>📸 Instagram: @tunegocio</p>
</footer>

<script>
let carrito = [];
let total = 0;

function toggleCarrito(){
    let c = document.getElementById("carrito");
    c.style.display = (c.style.display === "block") ? "none" : "block";
}

function actualizar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";
    total = 0;

    carrito.forEach((item, i) => {
        total += item.precio;

        let li = document.createElement("li");
        li.innerHTML = `${item.nombre} Q${item.precio} 
        <button onclick="eliminar(${i})">❌</button>`;
        lista.appendChild(li);
    });

    document.getElementById("total").textContent = total;
    document.getElementById("contador").textContent = carrito.length;
}

function agregar(nombre, precio, id){
    let cantidad = document.getElementById(id).value;

    for(let i=0; i<cantidad; i++){
        carrito.push({nombre, precio});
    }

    actualizar();
}

function eliminar(index){
    carrito.splice(index,1);
    actualizar();
}

function comprar(){
    let numero = "50212345678";
    let mensaje = "Hola quiero comprar:\n";

    carrito.forEach(p => {
        mensaje += "- " + p.nombre + "\n";
    });

    mensaje += "Total: Q" + total;

    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
    window.open(url, "_blank");
}

function filtrar(cat){
    let productos = document.querySelectorAll(".producto");

    productos.forEach(p => {
        if(cat === "todos" || p.dataset.categoria === cat){
            p.style.display = "block";
        } else {
            p.style.display = "none";
        }
    });
}
</script>

</body>
</html>
