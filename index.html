<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Store GT</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: #000;
    color: #fff;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: #fff;
    margin: 0 10px;
    cursor: pointer;
    transition: 0.3s;
}

nav a:hover {
    color: #00ffcc;
}

/* CARRITO */
.carrito-btn {
    position: relative;
    font-size: 26px;
    cursor: pointer;
}

#contador {
    position: absolute;
    top: -5px;
    right: -10px;
    background: red;
    color: white;
    border-radius: 50%;
    padding: 3px 7px;
    font-size: 12px;
}

/* HERO */
.hero {
    background: linear-gradient(45deg,#000,#222);
    color: white;
    text-align: center;
    padding: 50px;
}

/* PRODUCTOS */
.container {
    padding: 20px;
}

.productos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.producto {
    background: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
}

.producto:hover {
    transform: translateY(-5px);
}

.producto img {
    width: 100%;
    border-radius: 10px;
}

/* CANTIDAD */
.control-cantidad {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

.control-cantidad button {
    padding: 5px 10px;
}

.control-cantidad span {
    font-weight: bold;
}

/* BOTONES */
button {
    background: black;
    color: white;
    border: none;
    padding: 8px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 5px;
}

/* CARRITO PANEL */
#carrito {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: white;
    padding: 15px;
    box-shadow: -2px 0 10px rgba(0,0,0,0.3);
}

/* BOTÓN SUBIR */
#subir {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
}

/* NOTIFICACIÓN */
#toast {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: green;
    color: white;
    padding: 10px;
    border-radius: 5px;
    display: none;
}

/* FOOTER */
footer {
    background: black;
    color: white;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h2>Nova Store GT</h2>
    <nav>
        <a onclick="filtrar('todos')">Inicio</a>
        <a onclick="filtrar('accesorios')">Accesorios</a>
        <a onclick="filtrar('tecnologia')">Tecnología</a>
    </nav>
    <div class="carrito-btn" onclick="toggleCarrito()">
        🛒 <span id="contador">0</span>
    </div>
</header>

<div class="hero">
    <h1>Tu tienda premium 🔥</h1>
</div>

<div class="container">
<div class="productos">

<!-- PRODUCTO -->
<div class="producto" data-categoria="accesorios">
    <img src="reloj.jpeg">
    <h3>Reloj</h3>
    <p>Q120</p>

    <div class="control-cantidad">
        <button onclick="cambiarCantidad('c1',-1)">➖</button>
        <span id="c1">0</span>
        <button onclick="cambiarCantidad('c1',1)">➕</button>
    </div>

    <button onclick="agregar('Reloj',120,'c1')">Agregar</button>
</div>

<!-- PRODUCTO -->
<div class="producto" data-categoria="tecnologia">
    <img src="https://via.placeholder.com/200">
    <h3>Audífonos</h3>
    <p>Q150</p>

    <div class="control-cantidad">
        <button onclick="cambiarCantidad('c2',-1)">➖</button>
        <span id="c2">0</span>
        <button onclick="cambiarCantidad('c2',1)">➕</button>
    </div>

    <button onclick="agregar('Audífonos',150,'c2')">Agregar</button>
</div>

</div>
</div>

<!-- CARRITO -->
<div id="carrito">
    <button onclick="toggleCarrito()">❌</button>
    <h3>Carrito</h3>
    <ul id="lista"></ul>
    <p>Total: Q<span id="total">0</span></p>
    <button onclick="comprar()">Comprar</button>
</div>

<!-- TOAST -->
<div id="toast">Producto agregado ✅</div>

<!-- BOTÓN SUBIR -->
<button id="subir" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- FOOTER -->
<footer>
    <h3>Contacto</h3>

    <p>
        <a href="https://wa.me/50236427595" target="_blank" style="color:white;">
            <img src="https://cdn-icons-png.flaticon.com/24/733/733585.png">
            WhatsApp
        </a>
    </p>

    <p>
        <a href="https://www.instagram.com/_ali_monroy?igsh=MW1xZXIzdjA3M2p4eA==" target="_blank" style="color:white;">
            <img src="https://cdn-icons-png.flaticon.com/24/733/733558.png">
            Instagram
        </a>
    </p>

    <p>
        <a href="mailto:tunegocio@gmail.com" style="color:white;">
            <img src="https://cdn-icons-png.flaticon.com/24/732/732200.png">
            Correo
        </a>
    </p>
</footer>

<script>
let carrito = [];
let total = 0;

function toggleCarrito(){
    let c = document.getElementById("carrito");
    c.style.display = (c.style.display === "block") ? "none" : "block";
}

function cambiarCantidad(id, cambio){
    let el = document.getElementById(id);
    let val = parseInt(el.textContent);
    val += cambio;
    if(val < 0) val = 0;
    el.textContent = val;
}

function actualizar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";
    total = 0;

    carrito.forEach((item, i)=>{
        total += item.precio;

        let li = document.createElement("li");
        li.innerHTML = `${item.nombre} Q${item.precio}
        <button onclick="eliminar(${i})">❌</button>`;
        lista.appendChild(li);
    });

    document.getElementById("total").textContent = total;
    document.getElementById("contador").textContent = carrito.length;
}

function agregar(nombre, precio, id){
    let cantidad = parseInt(document.getElementById(id).textContent);

    if(cantidad === 0){
        alert("Selecciona al menos 1 producto");
        return;
    }

    for(let i=0;i<cantidad;i++){
        carrito.push({nombre, precio});
    }

    document.getElementById(id).textContent = 0;
    actualizar();

    mostrarToast();
}

function eliminar(i){
    carrito.splice(i,1);
    actualizar();
}

function mostrarToast(){
    let t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(()=>{t.style.display="none";},2000);
}

function comprar(){
    let numero = "50236427595";
    let mensaje = "Hola quiero comprar:\n";

    carrito.forEach(p=>{
        mensaje += "- "+p.nombre+"\n";
    });

    mensaje += "Total: Q"+total;

    let url = "https://wa.me/"+numero+"?text="+encodeURIComponent(mensaje);
    window.open(url,"_blank");
}

function filtrar(cat){
    let productos = document.querySelectorAll(".producto");

    productos.forEach(p=>{
        if(cat==="todos"||p.dataset.categoria===cat){
            p.style.display="block";
        }else{
            p.style.display="none";
        }
    });
}
</script>

</body>
</html>
